<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <title>ALMANAA | Neo Brutalism Wireframe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { black: '#013f34' } } } }
    </script>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=JetBrains+Mono&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: #ffffff;
            color: #013f34;
        }

        .mono {
            font-family: 'JetBrains Mono', monospace;
        }

        * {
            box-sizing: border-box;
        }

        .grid-bg {
            background-size: 25px 25px;
            background-image: linear-gradient(to right, #f3f4f6 1px, transparent 1px), linear-gradient(to bottom, #f3f4f6 1px, transparent 1px);
        }

        @media (min-width: 768px) {
            .grid-bg {
                background-size: 50px 50px;
            }
        }

        .wireframe-border {
            border: 1px solid #d1d5db;
        }
    </style>
</head>

<body class="grid-bg selection:bg-black selection:text-white md:pb-24 overflow-x-hidden">
    <div
        class="w-full max-w-[1440px] mx-auto wireframe-border min-h-screen bg-white md:mt-12 md:mb-12 shadow-2xl flex flex-col">
        <nav class="border-b border-gray-300 flex flex-col md:flex-row text-xs md:text-sm shrink-0">
            <div
                class="md:w-1/4 p-4 sm:p-6 md:p-8 font-bold text-xl sm:text-2xl md:text-3xl tracking-tighter uppercase border-b md:border-b-0 md:border-r border-gray-300 flex items-center justify-center md:justify-start gap-4">
                <a href="index.html" class="flex items-center gap-3">
                    <img src="../logo.jpg" alt="Almanaa Logo" class="h-8 md:h-10 w-auto shadow-sm">
                    <span>Almanaa.</span>
                </a>
            </div>
            <div class="md:w-3/4 flex flex-wrap sm:flex-nowrap w-full border-b md:border-b-0 border-gray-300">
                <a href="about.html"
                    class="w-1/2 sm:w-1/4 p-6 sm:p-8 font-bold text-center hover:bg-black hover:text-white uppercase transition-none border-r border-b sm:border-b-0 border-gray-300">Firm</a>
                <a href="services.html"
                    class="w-1/2 sm:w-1/4 p-6 sm:p-8 font-bold text-center hover:bg-black hover:text-white uppercase transition-none sm:border-r border-b sm:border-b-0 border-gray-300">Expertise</a>
                <a href="contact.html"
                    class="w-1/2 sm:w-1/4 p-6 sm:p-8 font-bold text-center hover:bg-black hover:text-white uppercase transition-none border-r border-gray-300">Contact</a>
                <a href="index-ar.html"
                    class="w-1/2 sm:w-1/4 p-6 sm:p-8 font-bold text-center hover:bg-black hover:text-white uppercase transition-none bg-gray-100 flex items-center justify-center gap-2 shrink-0">
                    <span class="mono text-[10px] opacity-50 hidden sm:inline">CMD:</span> AR
                </a>
            </div>
        </nav>
        <header class="border-b border-gray-300 flex flex-col xl:flex-row">
            <div
                class="xl:w-1/2 p-6 sm:p-8 md:p-24 border-b xl:border-b-0 xl:border-r border-gray-300 flex flex-col justify-center">
                <span
                    class="mono text-[8px] md:text-[10px] uppercase border border-gray-300 p-2 inline-block w-max mb-8 md:mb-12 font-bold">State:
                    Waiting input</span>
                <h1
                    class="text-4xl sm:text-5xl md:text-7xl font-bold uppercase leading-[1] md:leading-[0.9] tracking-tighter mix-blend-multiply mb-12 break-words">
                    Initialize<br>Contact.</h1>
                <div class="mono text-xs md:text-sm space-y-6">
                    <div class="flex gap-4 items-center"><span
                            class="opacity-50 w-12 border-r border-gray-300 block">TEL</span><span
                            class="font-bold">+966 11 000 0000</span></div>
                    <div class="flex gap-4 items-center"><span
                            class="opacity-50 w-12 border-r border-gray-300 block">EML</span><span
                            class="font-bold">START@ALMANAA.COM</span></div>
                    <div class="flex gap-4 items-center"><span
                            class="opacity-50 w-12 border-r border-gray-300 block">LOC</span><span
                            class="font-bold">KAFD, RIYADH, KSA</span></div>
                </div>
            </div>
            <div class="xl:w-1/2 flex items-center justify-center p-6 sm:p-8 md:p-24 relative overflow-hidden group">
                <img src="Home.png"
                    class="absolute inset-0 w-full h-full object-cover grayscale transition-transform duration-700 group-hover:scale-105">
                <div class="absolute inset-0 mix-blend-color opacity-80 bg-[#013f34]"></div>
                <form class="w-full max-w-lg flex flex-col border border-gray-300 shadow-sm bg-white relative z-10"
                    onsubmit="event.preventDefault()">
                    <div class="flex flex-col border-b border-gray-300">
                        <input type="text"
                            class="bg-transparent outline-none font-bold text-xl md:text-2xl p-6 placeholder:opacity-30"
                            placeholder="ENTERPRISE NAME.">
                    </div>
                    <div class="flex flex-col border-b border-gray-300">
                        <input type="text"
                            class="bg-transparent outline-none font-bold text-xl md:text-2xl p-6 placeholder:opacity-30"
                            placeholder="DIRECTIVE (SUBJECT).">
                    </div>
                    <div class="flex flex-col">
                        <input type="email"
                            class="bg-transparent outline-none font-bold text-xl md:text-2xl p-6 placeholder:opacity-30"
                            placeholder="ENCRYPTED EMAIL.">
                    </div>
                    <button
                        class="bg-black text-white hover:bg-[#013f34] transition-none w-full p-6 text-center font-bold text-lg md:text-xl uppercase tracking-tighter">Submit
                        Directive</button>
                </form>
            </div>
        </header>
        <footer
            class="mt-auto p-6 md:p-12 flex flex-col sm:flex-row justify-between items-center mono text-[10px] md:text-xs uppercase bg-black text-white gap-4">
            <span class="text-center sm:text-left">Runtime Env: 2026 // Auth: Almanaa Firm</span>
            <span class="bg-white text-black px-3 py-1 font-bold">END OF LINE.</span>
        </footer>
    </div>
</body>

</html>
